name: Auto Version and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create Version Tag and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Get the latest semver tag
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          echo "Latest tag: $LATEST_TAG"

          # Parse major.minor.patch
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Analyze commits since the last tag to determine bump type
          BUMP="patch"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for BREAKING CHANGE or '!' after type (e.g. feat!:) → major
          if echo "$COMMITS" | grep -qiE '(BREAKING[- ]CHANGE|^[a-z]+(\(.+\))?!:)'; then
            BUMP="major"
          # Check for feat commits → minor
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          # Apply bump
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: $BUMP"
          echo "Next version: $NEXT_VERSION"

          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const nextVersion = '${{ steps.version.outputs.next_version }}';
            const latestTag = '${{ steps.version.outputs.latest_tag }}';

            // Check if the tag already exists
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${nextVersion}`
              });
              console.log(`Tag ${nextVersion} already exists. Skipping.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // Create the tag
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${nextVersion}`,
              sha: context.sha
            });
            console.log(`Tag ${nextVersion} created at ${context.sha}`);

            // Create the release with auto-generated notes
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: nextVersion,
              name: nextVersion,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            });
            console.log(`Release ${nextVersion} created successfully.`);
