name: Create Tag and Release v1.4.0

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Commit SHA to tag (default: merge commit of PR #2)'
        required: false
        default: '912b19afd1b4e3dc211a146cfcad7734a9c6cfbb'

env:
  RELEASE_VERSION: v1.4.0
  RELEASE_TITLE: 'v1.4.0 — Governança de Agentes, Auto-aprendizado e Comunicação Efetiva'
  RELEASE_NOTES_FILE: RELEASE_NOTES_v1.4.0.md

jobs:
  create-release:
    name: Create Tag v1.4.0 and GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag ${{ env.RELEASE_VERSION }}
        run: |
          TARGET_COMMIT="${{ github.event.inputs.target_commit }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$RELEASE_VERSION"; then
            echo "Tag $RELEASE_VERSION already exists, skipping."
          else
            git tag -a "$RELEASE_VERSION" "$TARGET_COMMIT" -m "$RELEASE_TITLE" || {
              echo "Tag creation failed (possibly created concurrently). Verifying..."
              git ls-remote --tags origin | grep "$RELEASE_VERSION" && echo "Tag confirmed to exist." || exit 1
            }
            git push origin "$RELEASE_VERSION"
            echo "Tag $RELEASE_VERSION created pointing to $TARGET_COMMIT"
          fi

      - name: Create GitHub Release ${{ env.RELEASE_VERSION }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = process.env.RELEASE_VERSION;
            const title = process.env.RELEASE_TITLE;
            const notesFile = process.env.RELEASE_NOTES_FILE;

            // Check if release already exists
            let releaseExists = false;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });
              releaseExists = true;
              console.log(`Release ${version} already exists, skipping creation.`);
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            if (!releaseExists) {
              let notes;
              try {
                notes = fs.readFileSync(notesFile, 'utf8');
              } catch (e) {
                core.setFailed(`Release notes file '${notesFile}' not found. Please ensure it exists before running this workflow.`);
                return;
              }
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: version,
                name: title,
                body: notes,
                draft: false,
                prerelease: false
              });
              console.log(`Release ${version} created successfully.`);
            }
